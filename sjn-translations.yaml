 - key: UNDETERMINED_LANGUAGE
   english: "Undetermined"
   sjn:
     literal: "not known"
     roman: "úhinnen"
     tengwar: ""
   elements:
     - form: "ú"
       headword: "ú-"
       headword-meaning: "no, not, negative; impossible"
       attestation: attested
       source: "LotR/1061"
       derivations: []
       rationale: "Attested Sindarin negation prefix; triggers soft mutation."
     - form: "hinnen"
       headword: "sinnen"
       headword-meaning: "known (past participle)"
       attestation: neo-sindarin
       source: "Eldamo:ns (Fiona Jallings)"
       derivations:
         - "soft mutation after ú-: s -> h: sinnen -> hinnen"
       rationale: "Neo-Sindarin past participle for 'known'. Soft mutation s->h applies after ú-."
   composition: "Negative prefix + past participle; the prefix triggers soft mutation of the following s to h."
   status: defensible-neo-sindarin
   concerns: |
     English distinction between 'undetermined' and 'unrecognized' does not have a
     natural counterpart in Sindarin; UNDETERMINED_LANGUAGE and UNRECOGNIZED_LANGUAGE
     both translate to 'úhinnen'. The two keys produce the same Tengwar by design.
   history:
     - date: 2022-01-15
       note: "Initial 'la sinnen' (Quenya negation + Neo-Sindarin word)."
     - date: 2026-05-26
       note: "Replaced Quenya 'la' with attested Sindarin 'ú-', applying soft mutation s->h -> úhinnen."

