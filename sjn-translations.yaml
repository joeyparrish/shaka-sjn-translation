translations:
 - key: AD_DURATION
   english: "Ad duration"
   sjn:
     literal: "time for break for money"
     roman: "lû an hastië an mirian"
     tengwar: "\uE022\uE02C\uE04C \uE010\uE040 \uE028\uE025\uE040\uE000\uE02E\uE044\uE02E\uE046 \uE010\uE040 \uE011\uE020\uE044\uE02E\uE044\uE010\uE040"
   elements:
     - form: "lû"
       headword: "lû"
       headword-meaning: "time, occasion"
       attestation: attested
       source: "Eldamo:s"
       derivations: []
       rationale: "Attested Sindarin for time/occasion."
     - form: "an"
       headword: "an"
       headword-meaning: "for, to"
       attestation: attested
       source: "Eldamo:s"
       derivations:
         - "Triggers nasal mutation of the following consonant."
       rationale: "Attested Sindarin preposition."
     - form: "hastië"
       headword: "hastië"
       headword-meaning: "interruption, break"
       attestation: coined
       source: "coined:this-file (signature coinage)"
       derivations:
         - "Sindarin abstract on attested hast (hindrance, obstacle)"
       rationale: "Signature coinage of this translation for the ad/break concept."
     - form: "an"
       headword: "an"
       headword-meaning: "for, to"
       attestation: attested
       source: "Eldamo:s"
       derivations:
         - "Triggers nasal mutation of the following consonant."
       rationale: "Attested Sindarin preposition."
     - form: "mirian"
       headword: "mirian"
       headword-meaning: "money (a Númenórean coin)"
       attestation: attested
       source: "Eldamo:s"
       derivations: []
       rationale: "Attested Sindarin word for a unit of money."
   status: coinage
   concerns: "Multi-part compound; relies on the 'hastië an mirian' signature coinage for 'ad'."
   history:
     - date: 2020-03-26
       note: "Initial translation."
     - date: 2026-05-26
       note: "Audit pass: backfilled schema; kept original vocabulary."

