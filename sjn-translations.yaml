 - key: AIRPLAY
   english: "AirPlay"
   sjn:
     literal: "heavens-make-play"
     roman: "menelnortho"
     tengwar: "\uE011\uE010\uE046\uE022\uE046\uE010\uE020\uE04A\uE008\uE02E\uE04A"
   elements:
     - form: "menel"
       headword: "menel"
       headword-meaning: "heavens, sky"
       attestation: attested
       source: "Eldamo:s"
       derivations: []
       rationale: "Attested Sindarin for the heavens."
     - form: "northo"
       headword: "nor-"
       headword-meaning: "to run (causative: make-run, play)"
       attestation: attested
       source: "LotR/0213 (root)"
       derivations:
         - "causative -tha- (Neo-Sindarin extension): nor- -> northa-"
         - "imperative -o: northa- -> northo"
       rationale: "Established in this translation for PLAY."
   composition: "menel + northo as a single coined compound noun for the AirPlay technology."
   status: coinage
   concerns: "Coined compound; literal reading is 'sky-play'. Captures the 'play via wireless / through the air' metaphor."
   history:
     - date: 2022-03-17
       note: "Initial translation."
     - date: 2026-05-26
       note: "Audit pass: backfilled schema."

