 - key: NOT_APPLICABLE
   english: "Not applicable"
   sjn:
     literal: "not important / not worthy"
     roman: "úvall"
     tengwar: ""
   elements:
     - form: "ú"
       headword: "ú-"
       headword-meaning: "no, not, negative; impossible"
       attestation: attested
       source: "LotR/1061"
       derivations: []
       rationale: "Attested Sindarin negation prefix; triggers soft mutation of the following consonant."
     - form: "vall"
       headword: "ball"
       headword-meaning: "worthy, important"
       attestation: neo-sindarin
       source: "Eldamo:ns (Elaran, reformulated from Gnomish bâl)"
       derivations:
         - "soft mutation after ú-: b -> v: ball -> vall"
       rationale: |
         Neo-Sindarin reformulation of Gnomish 'bâl' (which is deprecated in
         Eldamo). Lenition b -> v applies after the negative prefix ú-.
   composition: "Negative prefix + adjective; the prefix triggers soft mutation of the adjective's initial b."
   status: defensible-neo-sindarin
   history:
     - date: 2022-01-15
       note: "Initial 'la bâl' (Quenya negation + Gnomish word)."
     - date: 2026-05-26
       note: "Replaced with Sindarin construction: ú- (attested) + ball (Neo-Sindarin reformulation, Eldamo:ns by Elaran) with soft mutation b->v -> úvall. Original bâl now deprecated."

