 - key: LOOP
   english: "Loop"
   sjn:
     literal: "play cyclically"
     roman: "osnortho"
     tengwar: ""
   elements:
     - form: "osnortho"
       headword: "osnortha-"
       headword-meaning: "(causative) to make-run-around, play cyclically"
       attestation: coined
       source: "coined:this-file (os- + nor- + causative -tha-)"
       derivations:
         - "os- prefix (Sindarin 'about, around'): os- + nor- -> osnor-"
         - "causative -tha- (Neo-Sindarin extension from Quenya): osnor- -> osnortha-"
         - "imperative -o: osnortha- -> osnortho"
       rationale: |
         Coined compound from attested elements. 'Play cyclically' captures
         looping. Replaces Quenya 'enquet-' which is also deprecated in
         Eldamo's Quenya entries.
   status: coinage
   concerns: "Coined verb compound; every element is attested but the combination is new."
   history:
     - date: 2022-01-15
       note: "Initial 'enqueto' (Quenya 'enquet-' with Sindarin imperative ending)."
     - date: 2026-05-26
       note: "Replaced Quenya 'enquet-' family with Sindarin coinage based on os- + nor- + causative -tha-."

