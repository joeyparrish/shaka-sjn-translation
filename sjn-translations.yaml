 - key: AUTO_GENERATED
   english: "Auto generated"
   sjn:
     literal: "generated"
     roman: "enias"
     tengwar: "\uE010\uE046\uE02E\uE044\uE025\uE040"
   elements:
     - form: "enias"
       headword: "enia-"
       headword-meaning: "to be born, be generated, result"
       attestation: neo-sindarin
       source: "Eldamo:ns (Sami Paldanius, based on GL/61)"
       derivations:
         - "gerund -s (or -as): enia- -> enias"
       rationale: "Neo-Sindarin verb for 'be generated'; gerund form for 'generated (thing)'."
   status: defensible-neo-sindarin
   history:
     - date: 2026-05-26
       note: New entry
     - date: 2026-05-26
       note: "Adjusted from 'cammo enias', with 'cammo' meaning 'adapt'.  'Generated' is better alone."

 - key: AUTO_QUALITY
   english: "Auto"
   sjn:
     literal: "adapted/fitted"
     roman: "camen"
     tengwar: "\uE003\uE011\uE040\uE010\uE046"
   elements:
     - form: "camen"
       headword: "cam-"
       headword-meaning: "to fit, suit, be agreeable, adapt"
       attestation: attested
       source: "VT44/14; VT47/20-21"
       derivations:
         - "past participle -en: cam- -> camen (fitted, adapted)"
       rationale: "Attested Sindarin verb 'to fit/adapt'. Past participle 'adapted/fitted' suits the UI sense of 'auto' (the quality setting that has been adapted to what fits)."
   status: defensible-neo-sindarin
   history:
     - date: 2018-11-03
       note: "Initial translation."
     - date: 2026-05-26
       note: "Audit pass: defensible Neo-Sindarin construction; backfilled schema."
     - date: 2026-05-27
       note: "Changed cammo (non-standard imperative hybrid) to camen (past participle 'adapted') for the auto/self-fitting sense."

