       headword-meaning: "known (past participle)"
       attestation: neo-sindarin
       source: "Eldamo:ns (Fiona Jallings)"
       derivations:
         - "soft mutation after ú-: s -> h: sinnen -> hinnen"
       rationale: "Neo-Sindarin past participle for 'known'. Soft mutation s->h applies after ú-."
   composition: "Negative prefix + past participle; the prefix triggers soft mutation of the following s to h."
