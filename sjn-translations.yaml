 - key: ENTER_LOOP_MODE
   english: "Loop the current video"
   sjn:
     literal: "enter cyclic-playing"
     roman: "minno osnorthad"
     tengwar: ""
   elements:
     - form: "minno"
       headword: "minna-"
       headword-meaning: "to enter"
       attestation: attested
       source: "LotR/0305 (Gandalf at the Door of Moria); PE17/041; PE23/143"
       derivations:
         - "imperative -o: minna- -> minno"
       rationale: "Attested Sindarin imperative for 'enter'."
     - form: "osnorthad"
       headword: "osnortha-"
       headword-meaning: "(gerund) cyclic-playing"
       attestation: coined
       source: "coined:this-file"
       derivations:
         - "gerund -ad: osnortha- -> osnorthad"
       rationale: "Gerund form of the coined osnortha- 'play cyclically'. See LOOP entry."
   status: coinage
   concerns: "osnorthad rests on attested components (os-, nor-, -tha-, -ad) but the compound is new."
   history:
     - date: 2022-01-15
       note: "Initial 'minno enquetië'."
     - date: 2026-05-26
       note: "Updated to use Sindarin coinage 'osnorthad' (gerund of osnortha-) instead of Quenya 'enquetië'."

 - key: ENTER_PICTURE_IN_PICTURE
   english: "Enter Picture-in-Picture"
   sjn:
     literal: "enter mind-picture in mind-picture"
     roman: "minno fanwos mi fanwos"
     tengwar: ""
   elements:
     - form: "minno"
       headword: "minna-"
       headword-meaning: "to enter"
       attestation: attested
       source: "LotR/0305"
       derivations:
         - "imperative -o: minna- -> minno"
       rationale: "Attested Sindarin imperative 'enter'."
     - form: "fanwos"
       headword: "fanwos"
       headword-meaning: "mind-picture"
       attestation: attested
       source: "PE17/174"
       derivations: []
       rationale: "See PICTURE_IN_PICTURE."
     - form: "mi"
       headword: "mi"
       headword-meaning: "in"
       attestation: attested
       source: "PE22/165"
       derivations: []
       rationale: "Attested Sindarin preposition 'in'."
     - form: "fanwos"
       headword: "fanwos"
       headword-meaning: "mind-picture"
       attestation: attested
       source: "PE17/174"
       derivations: []
       rationale: "Second occurrence."
   status: attested
   history:
     - date: 2022-01-15
       note: "Initial 'minno fanwos bir fanwos'."
     - date: 2026-05-26
       note: "Replaced 'bir' with attested 'mi'."

