name: Export translations to shaka-player

# Forks TARGET_REPO, pushes sjn.json to a branch in the fork, and opens a PR
# against the upstream if none is open.  Does not require write access to
# TARGET_REPO itself.
#
# Requires a repo secret SHAKA_PLAYER_TOKEN: a classic PAT with these scopes:
#   public_repo  - fork TARGET_REPO, push to the fork, open/edit a PR
#   read:user    - read the authenticated user's login
#   read:org     - required by gh's internal GraphQL queries for PR operations
# Fine-grained PATs do not work here; they return 403 when forking repos
# outside their account scope, even for public repos.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  TARGET_REPO: joeyparrish/shaka-player
  BRANCH: sjn-translations

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate sjn.json
        run: python scripts/export.py

      - name: Read source metadata
        id: meta
        run: |
          echo "sha=$(jq -r .sha source-meta.json)" >> "$GITHUB_OUTPUT"
          # Extract just the date from this full ISO timestamp with .[0:10]
          echo "date=$(jq -r '.date | .[0:10]' source-meta.json)" >> "$GITHUB_OUTPUT"
          echo "translated=$(jq -r .translated translation-stats.json)" >> "$GITHUB_OUTPUT"
          echo "total=$(jq -r .total translation-stats.json)" >> "$GITHUB_OUTPUT"

      - name: Fork and clone target repo
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
        run: gh repo fork "$TARGET_REPO" --clone -- target

      - name: Commit, push, and open PR
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
          SOURCE_DATE: ${{ steps.meta.outputs.date }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
          TRANSLATED: ${{ steps.meta.outputs.translated }}
          TOTAL: ${{ steps.meta.outputs.total }}
        run: |
          # Configure auth and identity
          gh auth setup-git
          git config user.email "278545291+shaka-translation-bot@users.noreply.github.com"
          git config user.name "Shaka Translation Bot"

          # Start with upstream/main
          git fetch upstream main
          git checkout -B "$BRANCH" upstream/main

          # Make updates
          cp ../sjn.json ui/locales/sjn.json
          git add ui/locales/sjn.json

          # Quit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes — skipping PR."
            exit 0
          fi

          # Commit and push
          git commit \
            -m "chore: Update Sindarin (sjn) locale" \
            -m "Generated from https://github.com/joeyparrish/shaka-sjn-translation." \
            -m "Translations made with Claude Code and https://github.com/joeyparrish/elvish-translation-tools." \
            -m "Source strings last updated ${SOURCE_DATE} (Shaka Player commit ${SOURCE_SHA})." \
            -m "Translation status: ${TRANSLATED}/${TOTAL} strings translated."
          git push --force origin HEAD:"$BRANCH"

          # Create/update PR
          FORK_OWNER=$(gh api user --jq .login)
          PR_NUMBER=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH" --author "$FORK_OWNER" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already open — updating description."
            gh pr edit "$PR_NUMBER" --repo "$TARGET_REPO" --body "$(git log -1 --format='%b')"
          else
            gh pr create \
              --repo "$TARGET_REPO" \
              --head "$FORK_OWNER:$BRANCH" \
              --base main \
              --fill
          fi
