name: Export translations to shaka-player

# Forks TARGET_REPO, pushes sjn.json to a branch in the fork, and opens a PR
# against the upstream if none is open.  Does not require write access to
# TARGET_REPO itself.
#
# Requires a repo secret SHAKA_PLAYER_TOKEN: a classic PAT with `public_repo`
# scope, sufficient to fork TARGET_REPO, push to the fork, and open a PR.
# Fine-grained PATs do not work here; they return 403 when forking repos
# outside their account scope, even for public repos.

on:
  push:
    branches: [main]

env:
  TARGET_REPO: joeyparrish/shaka-player
  BRANCH: sjn-translations

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate sjn.json
        run: python scripts/export.py

      - name: Read source metadata
        id: meta
        run: |
          echo "sha=$(jq -r .sha source-meta.json)" >> "$GITHUB_OUTPUT"
          # Extract just the date from this full ISO timestamp with .[0:10]
          echo "date=$(jq -r '.date | .[0:10]' source-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Fork and clone target repo
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
        run: gh repo fork "$TARGET_REPO" --clone -- target

      - name: Check for changes
        id: check
        run: |
          if diff -q sjn.json target/ui/locales/sjn.json > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
          SOURCE_DATE: ${{ steps.meta.outputs.date }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          gh auth setup-git
          git config user.email "278545291+shaka-translation-bot@users.noreply.github.com"
          git config user.name "Shaka Translation Bot"
          git fetch upstream main
          git checkout -B "$BRANCH" upstream/main
          cp ../sjn.json ui/locales/sjn.json
          git add ui/locales/sjn.json
          git commit \
            -m "Update Sindarin (sjn) locale" \
            -m "Generated by https://github.com/joeyparrish/shaka-sjn-translation using https://github.com/joeyparrish/elvish-translation-tools." \
            -m "Source strings last updated ${SOURCE_DATE} (upstream commit ${SOURCE_SHA})."
          git push --force origin HEAD:"$BRANCH"

      - name: Open PR if none exists
        if: steps.check.outputs.changed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
          SOURCE_DATE: ${{ steps.meta.outputs.date }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          FORK_OWNER=$(gh api user --jq .login)
          BODY=$(printf 'Generated by [joeyparrish/shaka-sjn-translation](https://github.com/joeyparrish/shaka-sjn-translation) using [joeyparrish/elvish-translation-tools](https://github.com/joeyparrish/elvish-translation-tools).\n\nSource strings last updated %s (upstream commit [%s](https://github.com/shaka-project/shaka-player/commit/%s)).' \
            "$SOURCE_DATE" "$SOURCE_SHA" "$SOURCE_SHA")
          PR_NUMBER=$(gh pr list --repo "$TARGET_REPO" --head "$FORK_OWNER:$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already open — updating description."
            gh pr edit "$PR_NUMBER" --repo "$TARGET_REPO" --body "$BODY"
          else
            gh pr create \
              --repo "$TARGET_REPO" \
              --title "Update Sindarin (sjn) locale" \
              --head "$FORK_OWNER:$BRANCH" \
              --base main \
              --body "$BODY"
          fi
