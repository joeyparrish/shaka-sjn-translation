name: Export translations to shaka-player

# Pushes sjn.json to a branch in the target repo and opens a PR if none is open.
#
# Requires a repo secret SHAKA_PLAYER_TOKEN: a PAT with `repo` scope on the
# TARGET_REPO (contents: write, pull-requests: write).

on:
  push:
    branches: [main]

env:
  TARGET_REPO: joeyparrish/shaka-player
  BRANCH: sjn-translations

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate sjn.json
        run: python scripts/export.py

      - name: Read source metadata
        id: meta
        run: |
          echo "sha=$(jq -r .sha source-meta.json)" >> "$GITHUB_OUTPUT"
          # Extract just the date from this full ISO timestamp with .[0:10]
          echo "date=$(jq -r '.date | .[0:10]' source-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Clone target repo
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
        run: gh repo clone "$TARGET_REPO" target

      - name: Copy locale file
        run: cp sjn.json target/ui/locales/sjn.json

      - name: Commit and push
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
          SOURCE_DATE: ${{ steps.meta.outputs.date }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "$BRANCH"
          git add ui/locales/sjn.json
          git commit \
            -m "Update Sindarin (sjn) locale" \
            -m "Generated by https://github.com/joeyparrish/shaka-sjn-translation using https://github.com/joeyparrish/elvish-translation-tools." \
            -m "Source strings last updated ${SOURCE_DATE} (upstream commit ${SOURCE_SHA})."
          git push --force origin "$BRANCH"

      - name: Open PR if none exists
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.SHAKA_PLAYER_TOKEN }}
          SOURCE_DATE: ${{ steps.meta.outputs.date }}
          SOURCE_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          if gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR already open — branch updated, no new PR needed."
          else
            gh pr create \
              --title "Update Sindarin (sjn) locale" \
              --head "$BRANCH" \
              --base main \
              --body "Generated by [joeyparrish/shaka-sjn-translation](https://github.com/joeyparrish/shaka-sjn-translation) using [joeyparrish/elvish-translation-tools](https://github.com/joeyparrish/elvish-translation-tools).

          Source strings last updated ${SOURCE_DATE} (upstream commit [${SOURCE_SHA}](https://github.com/shaka-project/shaka-player/commit/${SOURCE_SHA}))."
          fi
